<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameRank - Añadir Juego</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="plantilla_style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container navbar-content">
            <div class="logo">Game<span>Rank</span></div>
            <ul class="nav-links">
                <li><a href="plantilla_listado.html">Ranking</a></li>
                <li><a href="plantilla_alta.html" class="active">Añadir Juego</a></li>
            </ul>
        </div>
    </nav>

    <main class="container main-content">
        <div class="form-container">
            <h2 class="section-title" style="text-align: center; border: none;">Añadir Nuevo Registro</h2>
            
            <form action="plantilla_listado.html" method="GET">
                <div class="form-group">
                    <label for="titulo">Título del Juego</label>
                    <input type="text" id="titulo" name="titulo" class="form-control" placeholder="Ej: Half-Life 2" required>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label for="puntuacion">Puntuación</label>
                        <input type="number" id="puntuacion" name="puntuacion" class="form-control" step="0.1" min="0" max="10" placeholder="Ej: 9.8" required>
                    </div>

                    <div class="form-group" style="flex: 1;">
                        <label for="id_plataforma">Plataforma</label>
                        <select id="id_plataforma" name="id_plataforma" class="form-control" required>
                            <option value="">Selecciona opción...</option>
                            <option value="1">PC Master Race</option>
                            <option value="2">PlayStation 5</option>
                            <option value="3">Xbox Series X</option>
                            <option value="4">Nintendo Switch</option>
                            <option value="5">Mobile / iOS</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="imagen_url">URL de la Portada</label>
                    <input type="url" id="imagen_url" name="imagen_url" class="form-control" placeholder="https://ejemplo.com/portada.jpg">
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn" style="flex: 2;">Guardar Registro</button>
                    <a href="plantilla_listado.html" class="btn btn-secondary" style="flex: 1;">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 GameRank. Diseñado exclusivamente con HTML5 y CSS3.</p>
        </div>
    </footer>

</body>
</html>
